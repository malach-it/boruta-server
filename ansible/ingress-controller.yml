- hosts: localhost
  gather_facts: false
  vars:
    boruta_ingress_controller_name: "boruta-ingress-controller"
    boruta_ingress_service_account: "boruta-ingress-controller"
    boruta_ingress_service_name: "boruta-ingress-controller"
    boruta_gateway_image: "ghcr.io/malach-it/boruta-gateway:kubernetes-ingress-controller.alpha.7"
    boruta_ingress_watch_namespace: "{{ ingress_watch_namespace | default('*') }}"
    boruta_ingress_node_name: "global"
    boruta_ingress_replicas: "2"
    boruta_ingress_poll_interval: "10000"
    boruta_gateway_acceptors: "32"
    boruta_gateway_http_enabled: "true"
    boruta_gateway_http_port: "5000"
    boruta_gateway_https_enabled: "true"
    boruta_gateway_https_port: "5443"
    boruta_postgres_image: "postgres:16-alpine"
    boruta_postgres_host: "{{ boruta_postgres_name }}"

  tasks:
    - name: Create ingress controller namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ boruta_namespace }}"
        state: present

    - name: Create ingress controller service account
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: "{{ boruta_ingress_service_account }}"
            namespace: "{{ boruta_namespace }}"

    - name: Create namespace-scoped ingress controller role
      when: boruta_ingress_watch_namespace != '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: "{{ boruta_ingress_controller_name }}"
            namespace: "{{ boruta_ingress_watch_namespace }}"
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses"]
              verbs: ["get", "list", "watch"]

    - name: Bind namespace-scoped ingress controller role
      when: boruta_ingress_watch_namespace != '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: "{{ boruta_ingress_controller_name }}"
            namespace: "{{ boruta_ingress_watch_namespace }}"
          subjects:
            - kind: ServiceAccount
              name: "{{ boruta_ingress_service_account }}"
              namespace: "{{ boruta_namespace }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: "{{ boruta_ingress_controller_name }}"

    - name: Create cluster-scoped ingress controller role
      when: boruta_ingress_watch_namespace == '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: "{{ boruta_ingress_controller_name }}"
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses"]
              verbs: ["get", "list", "watch"]

    - name: Bind cluster-scoped ingress controller role
      when: boruta_ingress_watch_namespace == '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: "{{ boruta_ingress_controller_name }}"
          subjects:
            - kind: ServiceAccount
              name: "{{ boruta_ingress_service_account }}"
              namespace: "{{ boruta_namespace }}"
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: "{{ boruta_ingress_controller_name }}"

    - name: Create libcluster role
      when: boruta_libcluster_namespace != '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: libcluster-role
            namespace: "{{ boruta_libcluster_namespace }}"
          rules:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "watch"]

    - name: Bind libcluster role
      when: boruta_libcluster_namespace != '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: libcluster-bindings
            namespace: "{{ boruta_libcluster_namespace }}"
          subjects:
            - kind: ServiceAccount
              name: default
              namespace: "{{ boruta_namespace }}"
            - kind: ServiceAccount
              name: "{{ boruta_ingress_service_account }}"
              namespace: "{{ boruta_namespace }}"
          roleRef:
            kind: Role
            name: libcluster-role
            apiGroup: rbac.authorization.k8s.io

    - name: Create cluster-scoped libcluster role
      when: boruta_libcluster_namespace == '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: libcluster-role
          rules:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "watch"]

    - name: Bind cluster-scoped libcluster role
      when: boruta_libcluster_namespace == '*'
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: libcluster-bindings
          subjects:
            - kind: ServiceAccount
              name: default
              namespace: "{{ boruta_namespace }}"
            - kind: ServiceAccount
              name: "{{ boruta_ingress_service_account }}"
              namespace: "{{ boruta_namespace }}"
          roleRef:
            kind: ClusterRole
            name: libcluster-role
            apiGroup: rbac.authorization.k8s.io

    - name: Create ingress controller environment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ boruta_name }}-env"
            namespace: "{{ boruta_namespace }}"
          data:
            MIX_ENV: prod
            POSTGRES_USER: "{{ boruta_postgres_user }}"
            POSTGRES_PASSWORD: "{{ boruta_postgres_password }}"
            POSTGRES_DATABASE: "{{ boruta_postgres_database }}"
            POSTGRES_HOST: "{{ boruta_postgres_host }}"
            RELEASE_COOKIE: "{{ boruta_release_cookie }}"
            BORUTA_GATEWAY_ACCEPTORS: "{{ boruta_gateway_acceptors | string }}"
            BORUTA_GATEWAY_SERVER: "{{ boruta_gateway_http_enabled }}"
            BORUTA_GATEWAY_PORT: "{{ boruta_gateway_http_port | string }}"
            BORUTA_GATEWAY_HTTPS_SERVER: "{{ boruta_gateway_https_enabled | bool | ternary('true', 'false') }}"
            BORUTA_GATEWAY_HTTPS_PORT: "{{ boruta_gateway_https_port | string }}"
            BORUTA_GATEWAY_KUBERNETES_INGRESS_CONTROLLER: "true"
            BORUTA_GATEWAY_KUBERNETES_NAMESPACE: "{{ boruta_ingress_watch_namespace }}"
            BORUTA_GATEWAY_KUBERNETES_INGRESS_CLASS: "{{ boruta_ingress_class }}"
            BORUTA_GATEWAY_KUBERNETES_NODE_NAME: "{{ boruta_ingress_node_name }}"
            BORUTA_GATEWAY_KUBERNETES_POLL_INTERVAL: "{{ boruta_ingress_poll_interval }}"
            K8S_NAMESPACE: "{{ boruta_libcluster_namespace }}"
            K8S_SELECTOR: "{{ boruta_libcluster_selector }}"

    - name: Create postgres deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ boruta_postgres_name }}"
            namespace: "{{ boruta_namespace }}"
            labels:
              app: "{{ boruta_postgres_name }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: "{{ boruta_postgres_name }}"
            template:
              metadata:
                labels:
                  app: "{{ boruta_postgres_name }}"
              spec:
                containers:
                  - name: postgres
                    image: "{{ boruta_postgres_image }}"
                    imagePullPolicy: Always
                    args:
                      - "-c"
                      - "max_connections=1024"
                    ports:
                      - name: postgres
                        containerPort: 5432
                    env:
                      - name: POSTGRES_USER
                        value: "{{ boruta_postgres_user }}"
                      - name: POSTGRES_PASSWORD
                        value: "{{ boruta_postgres_password }}"
                      - name: POSTGRES_DB
                        value: "{{ boruta_postgres_database }}"
                    readinessProbe:
                      exec:
                        command:
                          - pg_isready
                          - "-U"
                          - "{{ boruta_postgres_user }}"
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      tcpSocket:
                        port: postgres
                      initialDelaySeconds: 30
                      periodSeconds: 30

    - name: Create postgres service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ boruta_postgres_name }}"
            namespace: "{{ boruta_namespace }}"
            labels:
              app: "{{ boruta_postgres_name }}"
          spec:
            selector:
              app: "{{ boruta_postgres_name }}"
            ports:
              - name: postgres
                protocol: TCP
                port: 5432
                targetPort: postgres

    - name: Create ingress controller deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "{{ boruta_ingress_controller_name }}"
            namespace: "{{ boruta_namespace }}"
            labels:
              app: "{{ boruta_ingress_controller_name }}"
              identity_platform: "boruta"
          spec:
            replicas: "{{ boruta_ingress_replicas | int }}"
            selector:
              matchLabels:
                app: "{{ boruta_ingress_controller_name }}"
            template:
              metadata:
                labels:
                  app: "{{ boruta_ingress_controller_name }}"
                  identity_platform: "boruta"
              spec:
                serviceAccountName: "{{ boruta_ingress_service_account }}"
                containers:
                  - name: boruta-gateway
                    image: "{{ boruta_gateway_image }}"
                    imagePullPolicy: Always
                    ports:
                      - name: http
                        containerPort: "{{ boruta_gateway_http_port | int }}"
                      - name: https
                        containerPort: "{{ boruta_gateway_https_port | int }}"
                    envFrom:
                      - configMapRef:
                          name: "{{ boruta_name }}-env"
                    readinessProbe:
                      tcpSocket:
                        port: http
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      tcpSocket:
                        port: http
                      initialDelaySeconds: 30
                      periodSeconds: 30

    - name: Create ingress controller service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "{{ boruta_ingress_service_name }}"
            namespace: "{{ boruta_namespace }}"
            labels:
              app: "{{ boruta_ingress_controller_name }}"
          spec:
            type: NodePort
            selector:
              app: "{{ boruta_ingress_controller_name }}"
            ports:
              - name: http
                protocol: TCP
                port: 80
                targetPort: http
                nodePort: "{{ boruta_ingress_http_node_port | int }}"
              - name: https
                protocol: TCP
                port: 443
                targetPort: https
                nodePort: "{{ boruta_ingress_https_node_port | int }}"
